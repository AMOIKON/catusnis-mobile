name: catusnis_mobile
description: "Application mobile CATUSNIS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Réseau & Auth ──────────────────────────────────────────────────────────
  dio:                         ^5.4.0
  flutter_secure_storage:      ^9.2.4

  # ── Stockage local ────────────────────────────────────────────────────────
  shared_preferences:          ^2.3.5
  sqflite:                     ^2.4.2+1
  path:                        ^1.9.1

  # ── State management ──────────────────────────────────────────────────────
  provider:                    ^6.1.2

  # ── Réseau ────────────────────────────────────────────────────────────────
  connectivity_plus:           ^7.1.1

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons:             ^1.0.8
  flutter_native_splash:       ^2.4.1
  google_fonts:                ^6.2.1

  # ── PDF / Impression / E-mail ─────────────────────────────────────────────
  pdf:                         ^3.10.8
  printing:                    ^5.13.0
  mailer:                      ^6.1.0
  share_plus: 10.1.4
  path_provider:               ^2.1.3
  intl:                        ^0.19.0

  # ── Archive auto + Signature ──────────────────────────────────────────────
  signature:                   ^5.4.0
  open_filex:                  ^4.7.0

  # ── Upload fichier / Scan ─────────────────────────────────────────────────
  image_picker:                ^1.1.2
  file_picker: 8.1.2
  permission_handler:          ^11.3.1

  # ── Dashboard enrichi ─────────────────────────────────────────────────────
  fl_chart:                    ^0.70.0

  # ── Notifications push ────────────────────────────────────────────────────
  firebase_messaging:          ^15.0.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:               ^6.0.0
  flutter_launcher_icons:      ^0.14.1

# ── Splash screen ─────────────────────────────────────────────────────────
flutter_native_splash:
  color:      "#0D3380"
  image:      assets/images/catusnis_splash.png
  color_dark: "#0D3380"
  image_dark: assets/images/catusnis_splash.png
  android_12:
    color:    "#0D3380"
    image:    assets/images/catusnis_splash.png
  fullscreen: false
  android:    true
  ios:        true
  web:        false

# ── Icône launcher ────────────────────────────────────────────────────────
flutter_icons:
  android:                  true
  ios:                      true
  image_path:               "assets/icons/app_icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android:          21

# ── Flutter ───────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/